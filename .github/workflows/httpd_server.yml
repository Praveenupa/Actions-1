name: Install HTTPD Server

on: push

jobs:
  first_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7

      - name: Install httpd
        run: |
          sudo apt-get update
          sudo apt-get  install apache2 -y

      - name: Write into index.html
        run: sudo echo "Hello world" > /var/www/html/index.html   

      - name: List Repo 
        run: ls -ltra